name: Python Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
    
    - name: Debug - show files
      run: |
        ls -la
        echo "---"
        ls -la src/ || echo "No src dir"
        echo "---"
        cat pyproject.toml || echo "No pyproject.toml"
    
    - name: Create venv and install
      run: |
        # Создаем виртуальное окружение
        uv venv
        echo "VENV created"
        
        # Показываем где Python
        ls -la .venv/bin/ || echo "No bin dir"
        
        # Устанавливаем пакет
        uv pip install -e .
        echo "Package installed"
        
        # Устанавливаем тестовые зависимости
        uv pip install pytest pytest-cov ruff mypy types-requests
        echo "Test dependencies installed"
        
        # Проверяем, что pytest установлен
        uv run which python
        uv run python -c "import pytest; print(f'pytest version: {pytest.__version__}')"
        uv run pytest --version
    
    - name: Run tests with pytest
      run: |
        uv run pytest tests/ -v --tb=short
    
    - name: Run tests with coverage
      run: |
        uv run pytest tests/ --cov=src --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
    
    - name: Lint with ruff
      run: |
        uv run ruff check src/ --output-format=github || true
    
    - name: Type check with mypy
      run: |
        uv run mypy src/ --ignore-missing-imports || true